version: '3.8'

services:
  messenger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messenger
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # Пути внутри контейнера — фиксированные, не зависят от .env на хосте
      DB_PATH: /data/messenger.db
      MEDIA_DIR: /data/media
      # Валидация обязательного секрета (docker compose читает .env автоматически)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in .env}
    volumes:
      - messenger_data:/data
    networks:
      - messenger_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8080}/api/server/info || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Cloudflare Tunnel (опционально)
  # Запуск: docker compose --profile cloudflare up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?TUNNEL_TOKEN is required for cloudflare profile}
    depends_on:
      - messenger
    networks:
      - messenger_net
    profiles:
      - cloudflare

networks:
  messenger_net:
    driver: bridge

volumes:
  messenger_data:
